<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lens Magnifier Effect</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh;
    background: #0a0a0a;
    overflow: hidden;
    cursor: none;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  .hero-lens {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  /* ===== 第1层：故障/扫描线背景文字 ===== */
  .glitch-layer {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  .glitch-text {
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 900;
    color: #e8e8e8;
    letter-spacing: 0.08em;
    position: relative;
    text-align: center;
  }

  /* 扫描线纹理叠加 */
  .glitch-text::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  .glitch-text .scramble {
    display: inline-block;
    animation: textGlitch 0.25s infinite steps(3);
  }
  .glitch-text .scramble:nth-child(2) { animation-delay: 0.08s; }
  .glitch-text .scramble:nth-child(3) { animation-delay: 0.04s; }
  .glitch-text .scramble:nth-child(4) { animation-delay: 0.12s; }
  .glitch-text .scramble:nth-child(5) { animation-delay: 0.06s; }

  @keyframes textGlitch {
    0%, 100% { transform: translate(0); opacity: 1; }
    5%  { transform: translate(-3px, 1px); opacity: 0.75; }
    10% { transform: translate(2px, -1px); opacity: 1; }
    15% { transform: translate(-1px, 2px); opacity: 0.5; }
    20% { transform: translate(0); opacity: 1; }
  }

  /* 扫描线移动动画 */
  .scanline {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: linear-gradient(
      180deg,
      transparent 0%, transparent 40%,
      rgba(255,255,255,0.04) 45%,
      rgba(255,255,255,0.08) 50%,
      rgba(255,255,255,0.04) 55%,
      transparent 60%, transparent 100%
    );
    animation: scanMove 3s linear infinite;
    opacity: 0.6;
  }
  @keyframes scanMove {
    0% { transform: translateY(-50%); }
    100% { transform: translateY(50%); }
  }

  /* 故障色偏移 */
  .glitch-r, .glitch-g, .glitch-b {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.15;
    pointer-events: none;
  }
  .glitch-r {
    color: #ff0040;
    animation: glitchShift 0.35s infinite steps(2) alternate;
    z-index: -1;
  }
  .glitch-g {
    color: #00ff80;
    animation: glitchShift 0.42s infinite steps(2) alternate-reverse;
    z-index: -2;
  }
  .glitch-b {
    color: #0080ff;
    animation: glitchShift 0.38s infinite steps(3) alternate;
    z-index: -3;
  }

  @keyframes glitchShift {
    0%   { transform: translate(0); }
    20%  { transform: translate(-4px, 2px); }
    40%  { transform: translate(4px, -1px); }
    60%  { transform: translate(-2px, 3px); }
    80%  { transform: translate(3px, -2px); }
    100% { transform: translate(0); }
  }

  /* ===== 第2层：圆形透镜区域（清晰文字） ===== */
  .lens-container {
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    pointer-events: none;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,0.18);
    box-shadow:
      0 0 40px rgba(255,255,255,0.08),
      inset 0 0 20px rgba(255,255,255,0.04);
    backdrop-filter: blur(0px);
    will-change: left, top;
    z-index: 10;
  }

  /* 内层光晕环 */
  .lens-container::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.12);
    box-shadow:
      inset 0 0 30px rgba(255,255,255,0.04),
      0 0 60px rgba(255,255,255,0.03);
    pointer-events: none;
    z-index: 2;
  }

  /* 透镜高光 */
  .lens-container::after {
    content: '';
    position: absolute;
    top: -49%; left: -49%;
    width: 200%; height: 200%;
    background: radial-gradient(
      ellipse at 35% 35%,
      rgba(255,255,255,0.12) 0%,
      transparent 50%
    );
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
  }

  .lens-content {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    white-space: nowrap;
    z-index: 1;
  }

  .clear-text {
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 0.08em;
    text-align: center;
    text-shadow: 0 0 30px rgba(255,255,255,0.3);
    position: absolute;
    /* 核心：使透镜内容与背景文字位置精确对齐 */
    white-space: nowrap;
  }

  /* ===== 第3层：全局文字背景定位参考 ===== */
  .hero-content {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    gap: 12px;
    z-index: 5;
  }

  .hero-title {
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 900;
    color: #e8e8e8;
    letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.1;
    position: relative;
  }

  .hero-subtitle {
    font-size: clamp(16px, 2.5vw, 28px);
    font-weight: 300;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.25em;
    text-align: center;
    margin-top: 8px;
  }

  /* ===== 自定义光标 ===== */
  .cursor-dot {
    position: fixed;
    width: 8px; height: 8px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
    transition: width 0.15s, height 0.15s, background 0.15s;
    will-change: left, top;
  }

  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 50%;
    pointer-events: none;
    z-index: 998;
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, border-color 0.3s;
    will-change: left, top;
  }

  /* hover 时放大光环 */
  .cursor-ring.hover {
    width: 56px; height: 56px;
    border-color: rgba(255,255,255,0.6);
  }

  /* 提示文字 */
  .hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    letter-spacing: 0.2em;
    z-index: 20;
  }
</style>
</head>
<body>

<div class="hero-lens">

  <!-- 全局扫描线 -->
  <div class="scanline"></div>

  <!-- 第1层：故障文字层 -->
  <div class="glitch-layer">
    <div class="glitch-text">
      <span class="scramble">M</span><span class="scramble">O</span><span class="scramble">O</span><span class="scramble">N</span><span class="scramble">S</span><span class="scramble">H</span><span class="scramble">O</span><span class="scramble">T</span>
      <br>
      <span class="scramble">A</span><span class="scramble">I</span>

      <!-- 色偏层 -->
      <span class="glitch-r">MOONSHOT<br>AI</span>
      <span class="glitch-g">MOONSHOT<br>AI</span>
      <span class="glitch-b">MOONSHOT<br>AI</span>
    </div>
  </div>

  <!-- 正常内容层（实际可见的文字） -->
  <div class="hero-content">
    <div class="hero-title">MOONSHOT<br>AI</div>
    <div class="hero-subtitle">探索未知 · 拥抱无限</div>
  </div>

  <!-- 第2层：透镜圆形区域 -->
  <div class="lens-container" id="lens">
    <div class="lens-content">
      <div class="clear-text" id="lensText">MOONSHOT<br>AI</div>
    </div>
  </div>

  <div class="hint">移动鼠标探索</div>

  <!-- 自定义光标 -->
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>
</div>

<script>
(function() {
  const lens = document.getElementById('lens');
  const lensText = document.getElementById('lensText');
  const cursorDot = document.getElementById('cursorDot');
  const cursorRing = document.getElementById('cursorRing');
  const hint = document.querySelector('.hint');

  const LENS_SIZE = 260;
  const HALF = LENS_SIZE / 2;

  // 获取 hero-content 的位置，用于计算透镜内容偏移
  const heroContent = document.querySelector('.hero-content');

  let mouseX = -9999, mouseY = -9999;
  let currentLX = -9999, currentLY = -9999;
  let hasMoved = false;

  // --- 鼠标位置跟踪 ---
  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;

    // 隐藏提示
    if (!hasMoved) {
      hasMoved = true;
      hint.style.opacity = '0';
      hint.style.transition = 'opacity 0.8s';
    }
    updateLens();
  });

  // --- 触摸支持（移动端） ---
  document.addEventListener('touchmove', function(e) {
    e.preventDefault();
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
    if (!hasMoved) {
      hasMoved = true;
      hint.style.opacity = '0';
      hint.style.transition = 'opacity 0.8s';
    }
    updateLens();
  }, { passive: false });

  document.addEventListener('touchstart', function(e) {
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
    updateLens();
  });

  // --- 透镜更新（使用 requestAnimationFrame） ---
  function updateLens() {
    // 透镜位置：居中于鼠标
    const lx = mouseX - HALF;
    const ly = mouseY - HALF;

    // 平滑过渡目标位置
    currentLX += (lx - currentLX) * 0.25;
    currentLY += (ly - currentLY) * 0.25;

    lens.style.left = currentLX + 'px';
    lens.style.top = currentLY + 'px';

    // 透镜内文字偏移：补偿透镜位置，使其内容与背景文字对齐
    // 计算背景文字的屏幕位置
    const heroRect = heroContent.getBoundingClientRect();
    const lensCenterCX = currentLX + HALF;
    const lensCenterCY = currentLY + HALF;
    const heroCenterX = heroRect.left + heroRect.width / 2;
    const heroCenterY = heroRect.top + heroRect.height / 2;

    // 透镜内文字需要偏移 = 背景文字中心 - 透镜中心
    const offsetX = heroCenterX - lensCenterCX;
    const offsetY = heroCenterY - lensCenterCY;

    lensText.style.transform = `translate(${offsetX}px, ${offsetY}px)`;

    // 自定义光标
    cursorDot.style.left = mouseX + 'px';
    cursorDot.style.top = mouseY + 'px';
    cursorRing.style.left = mouseX + 'px';
    cursorRing.style.top = mouseY + 'px';

    // 透镜描边颜色随位置微调
    const hueShift = (mouseX / window.innerWidth) * 40 - 20;
    lens.style.borderColor = `hsla(${210 + hueShift}, 30%, 70%, 0.2)`;
  }

  // 初始位置
  requestAnimationFrame(function loop() {
    if (currentLX === -9999 && mouseX === -9999) {
      // 初始显示在中间
      mouseX = window.innerWidth / 2;
      mouseY = window.innerHeight / 2;
      currentLX = mouseX - HALF;
      currentLY = mouseY - HALF;
      updateLens();
    }
    requestAnimationFrame(loop);
  });

  // --- 窗口尺寸变化时更新 ---
  window.addEventListener('resize', updateLens);

  // --- 透镜出现/消失动画 ---
  document.addEventListener('mouseenter', function() {
    lens.style.opacity = '1';
    lens.style.transform = 'scale(1)';
    cursorDot.style.opacity = '1';
    cursorRing.style.opacity = '1';
  });

  document.addEventListener('mouseleave', function() {
    lens.style.opacity = '0';
    lens.style.transform = 'scale(0.5)';
    cursorDot.style.opacity = '0';
    cursorRing.style.opacity = '0';
  });

  // 初始状态
  lens.style.transition = 'opacity 0.4s, transform 0.4s, border-color 0.5s';
  cursorDot.style.transition += ', opacity 0.3s';
  cursorRing.style.transition += ', opacity 0.3s';
})();
</script>
</body>
</html>
