<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaniug 个人主页</title>
  <style>
    :root {
      --main-color: #0084ff;
      --secondary-color: #fff;
      --bg-color: #f5f6fa;
      --shadow: 0 4px 18px rgba(0,0,0,0.12);
    }
    body {
      font-family: 'Segoe UI', 'Microsoft Yahei', Arial, sans-serif;
      background: var(--bg-color);
      color: #222;
      margin: 0;
      padding: 0;
    }
    header {
      background: linear-gradient(90deg, var(--main-color), #50caff 70%);
      color: var(--secondary-color);
      box-shadow: var(--shadow);
      padding: 40px 0 20px 0;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2.8rem;
      letter-spacing: 2px;
    }
    .profile {
      margin: -40px auto 0 auto;
      background: #fff;
      box-shadow: var(--shadow);
      border-radius: 18px;
      max-width: 800px;
      padding: 36px 32px 18px 32px;
      position: relative;
      z-index: 2;
      text-align: center;
      transition: box-shadow .25s;
    }
    .profile:hover {
      box-shadow: 0 8px 36px rgba(0,0,0,0.18);
    }
    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      margin-bottom: 16px;
      box-shadow: 0 3px 16px rgba(0,0,0,0.10);
      object-fit: cover;
      border: 4px solid #fff;
    }
    h2 {
      margin: 12px 0 8px 0;
    }
    .desc {
      color: #555;
      font-size: 1.1rem;
      margin-bottom: 18px;
    }
    .link-list {
      margin: 16px 0;
      padding: 0;
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    .link-list a {
      color: var(--main-color);
      text-decoration: none;
      font-weight: 600;
      transition: color .2s;
    }
    .link-list a:hover {
      color: #005bb5;
    }
    section {
      max-width: 800px;
      margin: 32px auto;
      background: #fff;
      box-shadow: var(--shadow);
      border-radius: 18px;
      padding: 24px 32px;
    }
    section h3 {
      margin-top: 0;
      color: var(--main-color);
    }
    .readme {
      border-top: 1px solid #eee;
      margin-top: 2em;
      padding-top: 1.2em;
    }
    @media (max-width: 600px) {
      .profile, section {
        padding: 18px 8px;
        border-radius: 12px;
        margin: 12px;
      }
      header {
        padding: 24px 0 10px 0;
      }
      .avatar {
        width: 80px;
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Chaniug 个人主页</h1>
    <div style="font-size:1.2rem;opacity:0.86;">🚀 多主题展示，美化你的个人简介</div>
  </header>
  <div class="profile">
    <img src="https://avatars.githubusercontent.com/u/your-github-id?v=4" alt="头像" class="avatar">
    <h2>你的昵称 / Chaniug</h2>
    <div class="desc">
      欢迎来到我的个人主页！这里支持多主题与定制化，致力于展示属于你的风采。
    </div>
    <ul class="link-list">
      <li><a href="https://github.com/Chaniug" target="_blank">GitHub</a></li>
      <li><a href="#about">关于</a></li>
      <li><a href="#readme">README</a></li>
      <!-- 可以添加更多社交链接 -->
    </ul>
  </div>

  <section id="about">
    <h3>关于我</h3>
    <p>
      这里是你的简短自我介绍，例如：Web前端开发者，热衷于UI美化和互动设计。<br>
      技能标签：HTML/CSS、JavaScript、Vue、React、动画设计等。
    </p>
  </section>

  <section class="readme" id="readme">
    <h3>README</h3>
    <p>
      🚀 个人主页美化模板，支持多主题和自定义，轻松展示风采。
    </p>
    <!-- 你可以自动抓取或粘贴README的其它部分到这里 -->
  </section>

  <footer style="text-align:center;color:#aaa;font-size:.95rem;margin:32px 0 12px 0;">
    © 2026 Chaniug 保留所有权利
  </footer>
</body>
</html>
